name: Release DMG

on:
  push:
    branches: [main]
    paths: ['project.yml', 'docs/**']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Read marketing version
        id: version
        run: |
          VERSION=$(grep 'MARKETING_VERSION' project.yml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check whether this version is already released
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # Macby's popover uses the Liquid Glass APIs (GlassEffectContainer /
      # .glassEffect), which only exist in the macOS 26 SDK. They're guarded at
      # runtime with #available(macOS 26, *) so the app still runs on macOS 14+,
      # but building them requires Xcode 26.
      - name: Select Xcode 26
        if: steps.check.outputs.exists == 'false'
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"

      - name: Install build tools
        if: steps.check.outputs.exists == 'false'
        run: brew install xcodegen create-dmg

      - name: Build universal (ad-hoc signed) DMG
        if: steps.check.outputs.exists == 'false'
        run: |
          make release XCODE_FLAGS='-destination generic/platform=macOS ARCHS="arm64 x86_64" ONLY_ACTIVE_ARCH=NO CODE_SIGN_IDENTITY=- CODE_SIGN_STYLE=Manual CODE_SIGNING_REQUIRED=NO'

      - name: Publish GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            "build/Macby-${{ steps.version.outputs.version }}.dmg" \
            --title "Macby ${{ steps.version.outputs.version }}" \
            --generate-notes

      - name: Bump landing page to the new version
        if: steps.check.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Point every download link and version label at the new release asset.
          perl -0777 -pi -e 's{Macby-\d+\.\d+\.\d+\.dmg}{Macby-$ENV{VERSION}.dmg}g' docs/index.html
          perl -0777 -pi -e 's{v\d+\.\d+\.\d+}{v$ENV{VERSION}}g' docs/index.html

      - name: Commit landing page version bump
        if: steps.check.outputs.exists == 'false'
        run: |
          if ! git diff --quiet -- docs/index.html; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/index.html
            git commit -m "Bump landing page to v${{ steps.version.outputs.version }} [skip ci]"
            git push
          fi

  deploy-docs:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Pick up the tip of main, including any version-bump commit the
          # release job just pushed.
          ref: main

      - name: Deploy landing page to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
